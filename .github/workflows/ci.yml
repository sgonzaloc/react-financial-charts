name: ci
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
jobs:
    ci:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: Cache .npm directory
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-

            - name: Install npm dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build
