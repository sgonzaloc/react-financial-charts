name: gh-pages
on:
    push:
        branches:
            - main
jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4 # ← actualizado a v4

            - name: Setup Node
              uses: actions/setup-node@v4 # ← actualizado a v4
              with:
                  node-version: "18" # ← cambiado a 18 (más actual)

            - name: Cache .npm directory
              uses: actions/cache@v4 # ← actualizado a v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-

            - name: Install npm dependencies
              run: npm ci

            - name: Build
              run: npm run docs

            - name: Deploy to GitHub Pages
              uses: peaceiris/actions-gh-pages@v4 # ← nuevo estándar
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./docs
                  publish_branch: gh-pages
