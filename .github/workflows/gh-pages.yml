name: gh-pages
on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "18"

            - name: Cache .npm directory
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-

            - name: Install npm dependencies
              run: npm ci

            - name: Build packages
              run: npm run build

            - name: Build Storybook with full error log
              id: storybook
              continue-on-error: true
              run: |
                  cd packages/stories
                  npx storybook build -c .storybook -o ../../docs --loglevel=silly 2>&1 | tee ../../storybook-full.log
                  exit ${PIPESTATUS[0]}

            - name: Display error details
              if: steps.storybook.outcome == 'failure'
              run: |
                  echo "========== STORYBOOK BUILD FAILED =========="
                  echo ""
                  echo "========== LAST 100 LINES =========="
                  tail -100 storybook-full.log
                  echo ""
                  echo "========== ERROR LINES =========="
                  grep -n -E "ERROR|Error|Module not found|Cannot find|Failed|ENOENT" storybook-full.log || echo "No error patterns found"
                  echo ""
                  echo "========== WEBPACK ERRORS =========="
                  grep -n -E "Module build failed|Compilation failed" storybook-full.log || echo "No webpack errors found"
                  echo ""
                  echo "========== FULL LOG ATTACHED BELOW =========="
                  cat storybook-full.log
                  exit 1

            - name: Upload full log as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: storybook-full-log
                  path: storybook-full.log
                  retention-days: 7

            - name: Deploy to GitHub Pages
              if: steps.storybook.outcome == 'success'
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./docs
                  publish_branch: gh-pages
                  force_orphan: true
